name: deploy-demo
on: [workflow_dispatch]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production      # ← 关键：job 指向 production 环境
    steps:
      - name: prove the job executed
        run: echo "==== JOB RAN, ref=$GITHUB_REF ===="
      - name: show environment variable
        run: echo "ENV_TARGET=${{ vars.ENV_TARGET }}"
